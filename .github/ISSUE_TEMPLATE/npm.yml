name: "NPM / Dependencies"
description: Update, add, remove, or audit npm packages and package metadata
title: "[INFRA] dependency update - package name"
labels: ["dependencies", "infra"]
body:
  - type: markdown
    attributes:
      value: |
        ## NPM / Dependencies Task
        Use this for dependency updates, security fixes, peer dependency changes, package metadata, or dependency removals.

        Current flow: research changelog and risk -> define update plan -> wait for issue label `status:approved` -> START WORK Project gate -> update -> verify build/tests/package consumption -> PR -> END WORK after merge or maintainer approval.

  - type: dropdown
    id: change-type
    attributes:
      label: Type of change
      options:
        - Update existing dependency (minor/patch)
        - Update existing dependency (major or breaking)
        - Add new dependency
        - Remove dependency
        - Security fix
        - Package metadata or exports change
    validations:
      required: true

  - type: dropdown
    id: team
    attributes:
      label: Team
      options:
        - Squad 1
        - Squad 2
        - Squad 3
    validations:
      required: true

  - type: textarea
    id: packages
    attributes:
      label: Package or metadata affected
      placeholder: |
        - `vitest`: 1.x -> 2.x
        - `package.json` exports map
        - `pnpm-lock.yaml`
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation and risk
      placeholder: |
        Why this is needed:
        Security/advisory link:
        Breaking changes:
        Peer dependency or consumer impact:
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Include package consumption checks when package output or exports change.
      placeholder: |
        Commands/checks:
        - pnpm test
        - pnpm run build
        - pnpm run verify:package, if package output changed
        Rollback plan:
    validations:
      required: true

  - type: checkboxes
    id: workflow-gates
    attributes:
      label: Workflow gates
      options:
        - label: START WORK must run only after issue label `status:approved`; it assigns the issue, moves Project status to `In progress`, and records branch/worktree before implementation.
        - label: PR must link this issue and include validation evidence.
        - label: END WORK moves the Project item to `Done` only after merge or explicit maintainer approval.

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      placeholder: Migration notes, lockfile concerns, rollback notes, related issues, or maintainer decisions.

  - type: textarea
    id: resources
    attributes:
      label: Related resources
      placeholder: Changelog, migration guide, advisory, package docs, related PRs.
