name: "📦 NPM / Dependencies"
description: Update, add or remove npm packages
title: "[NPM] Package name — short description"
labels: ["dependencies"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📦 NPM / Dependencies Task
        Use this for dependency updates, security fixes, or adding/removing packages.

  - type: dropdown
    id: change-type
    attributes:
      label: Type of change
      options:
        - Update existing dependency (minor/patch)
        - Update existing dependency (major — breaking)
        - Add new dependency
        - Remove dependency
        - Security fix
    validations:
      required: true

  - type: textarea
    id: packages
    attributes:
      label: Package(s) affected
      placeholder: |
        - `vitest`: 1.6.0 → 2.1.0
        - `@testing-library/react`: 14.x → 16.x
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this change needed?
      placeholder: |
        vitest 2.x improves workspace support and fixes a memory leak in watch mode.
        The update also resolves 2 moderate security advisories.
    validations:
      required: true

  - type: textarea
    id: breaking-changes
    attributes:
      label: Known breaking changes / migration notes
      placeholder: |
        vitest 2.x removes the `globals` option in tsconfig — must use `/// <reference types="vitest" />` instead.
        Reference: https://vitest.dev/guide/migration.html

  - type: checkboxes
    id: phases
    attributes:
      label: "✅ Implementation phases"
      options:
        - label: "1. **Research** — read changelogs, identify breaking changes, check peer dependency conflicts."
        - label: "2. **Update** — run `pnpm update` and resolve any conflicts."
        - label: "3. **Verify** — run `pnpm test`, `pnpm build`, `pnpm storybook` to confirm nothing is broken."
        - label: "4. **Document** — note any config changes needed in PR description."
        - label: "5. **Code review** — review by egdev6."
        - label: "6. **Merge to main** — egdev6 merges the PR."

  - type: textarea
    id: notes
    attributes:
      label: "📎 Additional notes"
      placeholder: Any edge cases or special considerations. Tag @egdev6 for questions.

  - type: textarea
    id: resources
    attributes:
      label: "🔗 Related resources"
      placeholder: Changelog URLs, migration guides, related security advisories.
