name: "Bug Fix"
description: Report and fix a bug in an existing component, utility, workflow, or package behavior
title: "[FIX] Short description of the bug"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Fix Task
        Use this when existing behavior is wrong or regressed.

        Current flow: reproduce with evidence -> identify root cause/spec -> wait for issue label `status:approved` -> assignee gate -> START WORK Project gate -> fix with regression test -> focused validation -> PR -> END WORK after merge or maintainer approval.

  - type: input
    id: affected-area
    attributes:
      label: Affected component, file, or workflow
      placeholder: e.g. Button, Select keyboard behavior, src/components/atoms/select/Select.tsx
    validations:
      required: true

  - type: dropdown
    id: team
    attributes:
      label: Team
      options:
        - Squad 1
        - Squad 2
        - Squad 3
    validations:
      required: true


  - type: dropdown
    id: milestone
    attributes:
      label: Milestone
      description: Required for issue creation. The agent must also set the GitHub issue milestone to this value.
      options:
        - Core
        - MVP
        - V1
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Current and expected behavior
      placeholder: |
        Current behavior:
        Expected behavior:
        User impact:
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Render or open ...
        2. Perform ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: root-cause
    attributes:
      label: Root cause or investigation notes
      description: Optional when opening; required before implementation handoff if known.
      placeholder: Failing test, suspect file, previous PR, browser/device, or logs.

  - type: checkboxes
    id: validation
    attributes:
      label: Fix validation
      options:
        - label: Regression test added or updated.
        - label: Focused affected tests pass.
        - label: TypeScript/build impact checked when source or exports changed.
        - label: Storybook/manual reproduction checked when UI behavior changed.
        - label: Accessibility evidence included when the bug affects semantics, keyboard, focus, or contrast.

  - type: checkboxes
    id: workflow-gates
    attributes:
      label: Workflow gates
      options:
        - label: START WORK must run only after issue label `status:approved` and assignee ownership are verified; if assigned to someone else, get explicit permission before reassigning, then move Project status to `In progress` and record branch/worktree before implementation.
        - label: PR must link this issue and include validation evidence.
        - label: END WORK moves the Project item to `Done` only after merge or explicit maintainer approval.

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      placeholder: Edge cases, related issues, known limitations, or maintainer decisions.
