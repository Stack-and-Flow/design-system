name: "Infrastructure / Tooling"
description: Add or improve CI, build tooling, project automation, or development infrastructure
title: "[INFRA] Short description"
labels: ["ci", "tooling", "infra"]
body:
  - type: markdown
    attributes:
      value: |
        ## Infrastructure Task
        Use this for GitHub Actions, Vite, Biome, Lefthook, Storybook build, tests, release automation, or project tooling.

        Current flow: define problem and risk -> plan exact config change -> wait for issue label `status:approved` -> assignee gate -> START WORK Project gate -> implement -> verify with local command or workflow run -> PR -> END WORK after merge or maintainer approval.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - GitHub Actions / CI
        - Vite / build config
        - Biome / formatting
        - Lefthook / git hooks
        - Storybook build / deployment
        - Testing infrastructure
        - Release / versioning
        - Other tooling
    validations:
      required: true

  - type: dropdown
    id: team
    attributes:
      label: Team
      options:
        - Squad 1
        - Squad 2
        - Squad 3
    validations:
      required: true


  - type: dropdown
    id: milestone
    attributes:
      label: Milestone
      description: Required for issue creation. The agent must also set the GitHub issue milestone to this value.
      options:
        - Core
        - MVP
        - V1
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve or what capability does it add?
      placeholder: Describe the current limitation, failure mode, or missing automation.
    validations:
      required: true

  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed change
      description: What exactly needs to be added or changed?
      placeholder: |
        Files/config affected:
        Expected behavior:
        Secrets or environment assumptions:
        Rollback plan:
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: How should this be verified before PR review?
      placeholder: |
        Local commands:
        Workflow run URL or draft PR check:
        Failure/rollback check:
    validations:
      required: true

  - type: checkboxes
    id: workflow-gates
    attributes:
      label: Workflow gates
      options:
        - label: START WORK must run only after issue label `status:approved` and assignee ownership are verified; if assigned to someone else, get explicit permission before reassigning, then move Project status to `In progress` and record branch/worktree before implementation.
        - label: PR must link this issue and include validation evidence.
        - label: END WORK moves the Project item to `Done` only after merge or explicit maintainer approval.

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      placeholder: Constraints, secrets, compatibility risks, or related decisions.

  - type: textarea
    id: resources
    attributes:
      label: Related resources
      placeholder: GitHub Actions docs, workflow runs, logs, examples, related issues.
