name: "Design Tokens"
description: Add, update, audit, or deprecate design tokens
title: "[UPDATE] token area - short description"
labels: ["tokens", "design"]
body:
  - type: markdown
    attributes:
      value: |
        ## Design Tokens Task
        Use this for CSS custom properties, Tailwind token utilities, color, typography, spacing, radius, shadow, motion, or token documentation.

        Current flow: audit token need and consumers -> define token/spec impact -> wait for issue label `status:approved` -> assignee gate -> START WORK Project gate -> implement -> contrast/visual/docs evidence -> PR -> END WORK after merge or maintainer approval.

  - type: dropdown
    id: token-type
    attributes:
      label: Token category
      options:
        - Colors
        - Typography
        - Spacing / sizing
        - Shadows / elevation
        - Border radius
        - Animation / transitions
        - Multiple categories
    validations:
      required: true

  - type: dropdown
    id: team
    attributes:
      label: Team
      options:
        - Squad 1
        - Squad 2
        - Squad 3
    validations:
      required: true


  - type: dropdown
    id: milestone
    attributes:
      label: Milestone
      description: Required for issue creation. The agent must also set the GitHub issue milestone to this value.
      options:
        - Core
        - MVP
        - V1
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why do these tokens need to change or be added?
      placeholder: |
        Current limitation:
        Design-system need:
        Accessibility/contrast impact:
    validations:
      required: true

  - type: textarea
    id: proposed-tokens
    attributes:
      label: Proposed token changes
      description: List token names/values when known, or describe the intended semantic role.
      placeholder: |
        Add/update/deprecate:
        Consumers/components impacted:
        Storybook/docs impact:
    validations:
      required: true

  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility
      options:
        - label: Existing tokens remain compatible.
        - label: Existing tokens are deprecated and migration notes are required.
        - label: Existing tokens are removed or renamed and this is breaking.

  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      placeholder: |
        Contrast checks:
        Component/story visual checks:
        Build/test commands:
        Documentation updates:
    validations:
      required: true

  - type: checkboxes
    id: workflow-gates
    attributes:
      label: Workflow gates
      options:
        - label: START WORK must run only after issue label `status:approved` and assignee ownership are verified; if assigned to someone else, get explicit permission before reassigning, then move Project status to `In progress` and record branch/worktree before implementation.
        - label: PR must link this issue and include validation evidence.
        - label: END WORK moves the Project item to `Done` only after merge or explicit maintainer approval.

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      placeholder: Figma references, contrast tools, migration notes, related issues, or maintainer decisions.

  - type: textarea
    id: resources
    attributes:
      label: Related resources
      placeholder: Figma, accessibility checker, token references, screenshots, related issues.
