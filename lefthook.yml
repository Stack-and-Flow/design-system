pre-commit:
  parallel: false
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    atl-gitignore:
      run: "node scripts/verify-atl-gitignore.mjs"
    prop-docs:
      run: "node scripts/verify-prop-default-docs.mjs"
    typecheck:
      run: "pnpm exec tsc --noEmit"
commit-msg:
  commands:
    commitlint:
      run: "pnpm exec commitlint --edit {1}"
pre-push:
  parallel: false
  commands:
    atl-gitignore:
      run: "node scripts/verify-atl-gitignore.mjs"
    test:
      run: "pnpm exec vitest run --run"
